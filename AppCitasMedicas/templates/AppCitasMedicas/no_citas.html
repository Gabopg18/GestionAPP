{% extends 'AppCitasMedicas/base.html' %}

{% block title %}Citas no encontradas{% endblock %}

{% block content %}
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-8 col-lg-6">
      <div class="alert alert-warning text-center mt-5">
        <h4 class="alert-heading">
          <i class="bi bi-exclamation-triangle-fill"></i>
          No se encontraron citas para la cédula {{ cedula }}
        </h4>
        <p class="mb-3">
          Por favor verifica que hayas ingresado correctamente tu número de identificación.
        </p>
        <hr>
        <div class="d-grid gap-2 d-md-block">
          <a href="{% url 'buscar_citas' %}" class="btn btn-primary">
            <i class="bi bi-search"></i> Volver a buscar
          </a>
          <a href="{% url 'inicio_general' %}" class="btn btn-outline-secondary ms-2">
            <i class="bi bi-house-door"></i> Ir al inicio
          </a>
        </div>
      </div>
    </div>
  </div>
</div>
{% endblock %}
